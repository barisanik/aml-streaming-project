# /configs/producer_config.yml
# ============================================================
#   Config File: Producer Config
# ============================================================
#   Purpose: 
#     Parameters for txn_producer.py. Includes time model, arrival process, and volume targets.
#
#   Logic:
#    - All profile-generation parameters live here so nothing is hardcoded in the script.
#

reproducibility:
  seed: 0  # binds random.seed() and numpy seed for repeatable runs
 
time_model:
  time_compression_factor: 300   # 1 real second = 300 simulated seconds
  simulation_start: "2026-01-01T00:00:00Z"  # simulated clock start (UTC, event_time origin)
 
volume:
  target_transactions_per_simulated_day: 50000 # Transaction per day limit. Approximately 174 msg/sec at 300x compression.
 
arrival_process:
  distribution: "exponential"   # inter-arrival wait time sampling (numpy.random.exponential)
  base_rate_per_second: 0.579   # derived from target_transactions_per_simulated_day / 86400
 
hourly_intensity_multiplier:
  # sinusoidal day/night activity curve, applied on top of base_rate_per_second
  type: "sinusoidal"
  peak_hour: 14   # hour of day (simulated, 0-23) with highest activity
  trough_hour: 3  # hour of day with lowest activity
  amplitude: 0.6  # multiplier swing around 1.0 (e.g. 0.4x - 1.6x)
  baseline: 1.0

channel:
  morning:            # 7 - 13
    atm: 0.25
    branch: 0.25
    mobile: 0.25
    web: 0.25
  afternoon:          # 13 - 19
    atm: 0.25
    branch: 0.25
    mobile: 0.25
    web: 0.25
  evening:            # 19 - 1
    atm: 0.10
    branch: 0.0
    mobile: 0.45
    web: 0.45
  night:              # 1 - 7
    atm: 0.06
    branch: 0.0
    mobile: 0.47
    web: 0.47
 
transaction_type_weights:
  transfer_in: 0.10
  transfer_out: 0.40
  card_payment: 0.25
  cash_deposit: 0.10
  cash_withdrawal: 0.15

topics:
  transactions_topic: "transactions"   # Redpanda topic name
 
currencies:
  TR: "TRY"
  EU: "EUR"
  GB: "GBP"

kafka:
  bootstrap_servers: "localhost:19092"  # URL of redpanda working on Docker

profiles_source:
  path: "profiles.json"   # output of profile_gen.py, read by producer for profile-driven generation

postgres:
  host: "localhost"
  port: 5432
  dbname: "aml_platform"
  user: "app_producer"